        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #f5f5f5;
            color: #111;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 36px;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
        }

        .search-bar {
            margin-bottom: 30px;
            position: sticky;
            top: 0;
            background: #f5f5f5;
            padding-bottom: 15px;
            z-index: 10;
        }

        #search {
            width: 100%;
            padding: 14px 18px;
            borderadius: 14px;
            border: 1px solid #ddd;
            font-size: 16px;
            outline: none;
        }

        #search:focus {
            border-color: #000;
        }

        .stats {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .stat-card {
            background: white;
            padding: 16px 20px;
            borderadius: 14px;
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.05);
            flex: 1;
            min-width: 200px;
        }

        .stat-card h3 {
            font-size: 14px;
            color: #666;
            margin-bottom: 6px;
        }

        .stat-card p {
            font-size: 28px;
            font-weight: 700;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 22px;
        }

        .card {
            background: white;
            borderadius: 18px;
            overflow: hidden;
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.06);
            transition: 0.2s ease;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-4px);
        }

        .card img {
            width: 100%;
            aspectatio: 1/1;
            object-fit: cover;
            background: #eee;
        }

        .card-content {
            padding: 16px;
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .design-name {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 12px;
            line-height: 1.4;
        }

        .sizes {
            margin-bottom: 14px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .size-badge {
            background: #f0f0f0;
            padding: 6px 10px;
            borderadius: 999px;
            font-size: 12px;
            font-weight: 600;
        }

        .btn {
            margin-top: auto;
            display: inline-block;
            text-align: center;
            background: #111;
            color: white;
            text-decoration: none;
            padding: 12px;
            borderadius: 12px;
            font-weight: 600;
            transition: 0.2s ease;
        }

        .btn:hover {
            background: #333;
        }

        .not-found {
            color: #d11a2a;
            font-size: 13px;
            font-weight: 600;
            margin-top: auto;
        }

        .loading {
            text-align: center;
            padding: 50px;
            font-size: 18px;
            color: #666;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 28px;
            }
        }
    </style>
</head>

        function normalize(str) {
            return str
                .toLowerCase()
                .replace(/[^a-z0-9]/g, '');
        }

        function getImageUrl(designName, product) {
            // 1. Try to get image from product data
            if (product?.images?.[0]?.src) {
                return product.images[0].src;
            }
            
            // 2. Try to get image from fallback mapping
            if (imageFallback[designName]) {
                return imageFallback[designName];
            }
            
            // 3. Fallback to placeholder
            return 'https://via.placeholder.com/500x500?text=No+Image';
        }

        function beautifyName(name) {
            return name
                .replace(/^[0-9]+/, '')
                .replace(/([A-Z])/g, ' $1')
                .trim();
        }

        async function loadProducts() {
            try {
                const response = await fetch('https://kumudcreations.in/products.json?limit=250');
                const data = await response.json();
                products = data.products || [];

                document.getElementById('loading').style.display = 'none';

                renderProducts();
                updateStats();

            } catch (error) {
                console.error(error);

                document.getElementById('loading').innerHTML = 'Unable to load Shopify products. Showing inventory only.';

                renderProducts();
                updateStats();
            }
        }

        function findMatchingProduct(designName) {
            const design = normalize(designName);

            return products.find(product => {
                const title = normalize(product.title);

                return (
                    title.includes(design) ||
                    design.includes(title)
                );
            });
        }

        function renderProducts(searchTerm = '') {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';

            const filtered = inventory.filter(item =>
                item.design.toLowerCase().includes(searchTerm.toLowerCase())
            );

            filtered.forEach(item => {

                const product = findMatchingProduct(item.design);

                const image = getImageUrl(item.design, product);
                
                // Determine if we should show product link or "not found" message
                // Show "not found" message only if:
                // 1. Product is not found in Shopify AND
                // 2. No fallback image is provided for this design
                const showProductLink = product !== null;
                const showNotFoundMessage = !product && !imageFallback[item.design];

                const productLink = product
                    ? `https://kumudcreations.in/products/${product.handle}`
                    : null;

                const card = document.createElement('div');
                card.className = 'card';

                card.innerHTML = `
          <img
            src="${image}"
            alt="${item.design}"
            loading="lazy"
            onerror="this.src='https://via.placeholder.com/500x500?text=No+Image'"
          />

          <div class="card-content">
            <div class="design-name">
              ${beautifyName(item.design)}
            </div>

            <div class="sizes">
              ${item.sizes.map(size => `
                <span class="size-badge">${size}</span>
              `).join('')}
            </div>

            ${showProductLink
                        ? `<a class="btn" href="${productLink}" target="_blank">View Product</a>`
                        : showNotFoundMessage
                            ? `<div class="not-found">Product not found on website</div>`
                            : ``
                    }
          </div>
        `;

                grid.appendChild(card);
            });
        }

        function updateStats() {
            document.getElementById('designCount').innerText = inventory.length;

            const totalUnits = inventory.reduce((sum, item) => sum + item.qty, 0);
            document.getElementById('unitCount').innerText = totalUnits;
        }

        document.getElementById('search').addEventListener('input', (e) => {
            renderProducts(e.target.value);
        });

        loadProducts();

    </script>
</body>

</html>
