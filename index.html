        :root {
            --primary: #1a1a1a;
            --secondary: #2c3e50;
            --accent: #3498db;
            --success: #27ae60;
            --warning: #f39c12;
            --danger: #e74c3c;
            --light: #ecf0f1;
            --dark: #2c3e50;
            --gray: #95a5a6;
            --gray-light: #bdc3c7;
            --gray-dark: #7f8c8d;
            --white: #ffffff;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.12), 0 1px 2px rgba(0,0,0,0.24);
            --shadow-md: 0 3px 6px rgba(0,0,0,0.16), 0 3px 6px rgba(0,0,0,0.23);
            --shadow-lg: 0 10px 20px rgba(0,0,0,0.19), 0 6px 6px rgba(0,0,0,0.23);
            --radius-sm: 4px;
            --radius-md: 8px;
            --radius-lg: 16px;
            --transition-base: 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: var(--dark);
            padding: 0;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 10% 20%, rgba(102, 126, 234, 0.1) 0%, transparent 20%),
                radial-gradient(circle at 90% 80%, rgba(118, 75, 162, 0.1) 0%, transparent 20%);
            pointer-events: none;
            z-index: -1;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1rem;
            width: 100%;
        }

        .header {
            text-align: center;
            padding: 2rem 0;
            margin-bottom: 2rem;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
            letter-spacing: -0.5px;
        }

        .header p {
            font-size: 1.125rem;
            color: var(--gray-dark);
            font-weight: 500;
        }

        .search-bar {
            margin-bottom: 2rem;
            position: sticky;
            top: 1rem;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 1rem;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            border: 1px solid rgba(255, 255, 255, 0.2);
            z-index: 1000;
        }

        #search {
            width: 100%;
            padding: 14px 18px;
            border-radius: 14px;
            border: 1px solid #ddd;
            font-size: 16px;
            outline: none;
        }

        #search:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.25);
            transform: translateY(-1px);
        }

        #search::placeholder {
            color: var(--gray);
            opacity: 0.7;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: var(--radius-lg);
            padding: 1.75rem;
            text-align: center;
            box-shadow: var(--shadow-md);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: var(--transition-base);
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
        }

        .stat-card h3 {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--gray-dark);
            margin-bottom: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-card p {
            font-size: 2.25rem;
            font-weight: 700;
            color: var(--primary);
            margin: 0;
            line-height: 1;
            font-family: 'Courier New', monospace;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.75rem;
            margin-bottom: 2rem;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-md);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: var(--transition-base);
            display: flex;
            flex-direction: column;
            position: relative;
            cursor: pointer;
        }

        .card:hover {
            transform: translateY(-6px) scale(1.02);
            box-shadow: var(--shadow-lg);
            border-color: rgba(255, 255, 255, 0.4);
        }

        .card:hover .card-content {
            background: rgba(255, 255, 255, 0.98);
        }

        .card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            transition: var(--transition-base);
        }

        .card:hover img {
            transform: scale(1.03);
        }

        .card-content {
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            flex: 1;
            background: rgba(255, 255, 255, 0.95);
            transition: var(--transition-base);
        }

        .design-name {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 1rem;
            line-height: 1.3;
            flex-grow: 1;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .sizes {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }

        .size-badge {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 0.375rem 0.875rem;
            border-radius: var(--radius-sm);
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: var(--transition-base);
            box-shadow: var(--shadow-sm);
        }

        .size-badge:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .btn {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: var(--radius-md);
            font-weight: 600;
            font-size: 0.875rem;
            text-align: center;
            transition: var(--transition-base);
            border: none;
            cursor: pointer;
            box-shadow: var(--shadow-sm);
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
            background: linear-gradient(135deg, #5a67d8 0%, #6b46c1 100%);
        }

        .btn:active {
            transform: translateY(0);
        }

        .not-found {
            margin-top: auto;
            padding: 1rem;
            text-align: center;
            background: rgba(236, 240, 241, 0.5);
            border-radius: var(--radius-md);
            font-size: 0.875rem;
            font-weight: 500;
            color: #e74c3c;
            border: 1px solid rgba(231, 76, 60, 0.2);
        }

        .loading {
            text-align: center;
            padding: 3rem;
            font-size: 1.25rem;
            color: var(--gray-dark);
            font-weight: 500;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        .loading::after {
            content: '';
            width: 40px;
            height: 40px;
            border: 4px solid var(--gray-light);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--gray-dark);
        }

        .empty-state h2 {
            font-size: 1.75rem;
            margin-bottom: 1rem;
            color: var(--primary);
        }

        .empty-state p {
            font-size: 1.125rem;
            margin-bottom: 1.5rem;
            line-height: 1.6;
        }

        .empty-state .btn {
            margin-top: 1.5rem;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2rem;
            }
            
            .header p {
                font-size: 1rem;
            }
            
            .container {
                padding: 0.75rem;
            }
            
            .search-bar {
                padding: 0.75rem;
                margin-bottom: 1.5rem;
            }
            
            #search {
                padding: 0.75rem 1rem;
                font-size: 0.9rem;
            }
            
            .stats {
                grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
                gap: 1rem;
            }
            
            .stat-card {
                padding: 1.25rem;
            }
            
            .stat-card p {
                font-size: 1.75rem;
            }
            
            .grid {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
                gap: 1.25rem;
            }
            
            .card img {
                height: 200px;
            }
            
            .card-content {
                padding: 1.25rem;
            }
            
            .design-name {
                font-size: 1.1rem;
                margin-bottom: 0.75rem;
            }
            
            .sizes {
                margin-bottom: 1rem;
            }
            
            .btn {
                padding: 0.625rem 1.25rem;
                font-size: 0.8rem;
            }
        }

        @media (max-width: 480px) {
            .header {
                padding: 1.5rem 0;
                margin-bottom: 1.5rem;
            }
            
            .header h1 {
                font-size: 1.75rem;
            }
            
            .header p {
                font-size: 0.9rem;
            }
            
            .stats {
                grid-template-columns: 1fr;
            }
            
            .stat-card {
                padding: 1rem;
            }
            
            .stat-card p {
                font-size: 1.5rem;
            }
            
            .grid {
                grid-template-columns: 1fr;
            }
            
            .card img {
                height: 180px;
            }
        }
        
        /* Print styles */
        @media print {
            body {
                background: white !important;
            }
            
            .header, .search-bar, .stats {
                background: white !important;
                box-shadow: none !important;
                border: 1px solid #ddd !important;
            }
            
            .card {
                box-shadow: none !important;
                border: 1px solid #ddd !important;
                margin-bottom: 1rem !important;
            }
        }
    </style>
</head>

        function normalize(str) {
            return str
                .toLowerCase()
                .replace(/[^a-z0-9]/g, '');
        }

        function getImageUrl(designName, product) {
            // 1. Try to get image from product data
            if (product?.images?.[0]?.src) {
                return product.images[0].src;
            }
            
            // 2. Try to get image from fallback mapping
            if (imageFallback[designName]) {
                return imageFallback[designName];
            }
            
            // 3. Fallback to placeholder
            return 'https://via.placeholder.com/500x500?text=No+Image';
        }

        function beautifyName(name) {
            return name
                .replace(/^[0-9]+/, '')
                .replace(/([A-Z])/g, ' $1')
                .trim();
        }

        async function loadProducts() {
            try {
                const response = await fetch('https://kumudcreations.in/products.json?limit=250');
                const data = await response.json();
                products = data.products || [];

                document.getElementById('loading').style.display = 'none';

                renderProducts();
                updateStats();

            } catch (error) {
                console.error(error);

                document.getElementById('loading').innerHTML = 'Unable to load Shopify products. Showing inventory only.';

                renderProducts();
                updateStats();
            }
        }

        function findMatchingProduct(designName) {
            const design = normalize(designName);

            return products.find(product => {
                const title = normalize(product.title);

                return (
                    title.includes(design) ||
                    design.includes(title)
                );
            });
        }

        function renderProducts(searchTerm = '') {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';

            const filtered = inventory.filter(item =>
                item.design.toLowerCase().includes(searchTerm.toLowerCase())
            );

            filtered.forEach(item => {

                const product = findMatchingProduct(item.design);

                const image = getImageUrl(item.design, product);
                
                // Determine if we should show product link or "not found" message
                // Show "not found" message only if:
                // 1. Product is not found in Shopify AND
                // 2. No fallback image is provided for this design
                const showProductLink = product !== null;
                const showNotFoundMessage = !product && !imageFallback[item.design];

                const productLink = product
                    ? `https://kumudcreations.in/products/${product.handle}`
                    : null;

                const card = document.createElement('div');
                card.className = 'card';

                card.innerHTML = `
          <img
            src="${image}"
            alt="${item.design}"
            loading="lazy"
            onerror="this.src='https://via.placeholder.com/500x500?text=No+Image'"
          />

          <div class="card-content">
            <div class="design-name">
              ${beautifyName(item.design)}
            </div>

            <div class="sizes">
              ${item.sizes.map(size => `
                <span class="size-badge">${size}</span>
              `).join('')}
            </div>

            ${showProductLink
                        ? `<a class="btn" href="${productLink}" target="_blank">View Product</a>`
                        : showNotFoundMessage
                            ? `<div class="not-found">Product not found on website</div>`
                            : ``
                    }
          </div>
        `;

                grid.appendChild(card);
            });
        }

        function updateStats() {
            document.getElementById('designCount').innerText = inventory.length;

            const totalUnits = inventory.reduce((sum, item) => sum + item.qty, 0);
            document.getElementById('unitCount').innerText = totalUnits;
        }

        document.getElementById('search').addEventListener('input', (e) => {
            renderProducts(e.target.value);
        });

        loadProducts();

    </script>
